# Configuration minimale pour tester Bee-Hive OS en mode Nested
# Sauvegarder ce fichier sous : ~/hyprland-test.conf

monitor=WL-1,1920x1080@60,0x0,1

input {
    kb_layout = fr
    follow_mouse = 1
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(ffb81cee)
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

animations {
    enabled = yes
}

# Launch Bee-Hive OS on nested mode startup
exec-once = quickshell -p ~/beehive_os/shell.qml

# Shortcut to close nested mode (SUPER+Q)
bind = SUPER, Q, exit
