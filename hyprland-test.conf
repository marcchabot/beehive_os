# ═══════════════════════════════════════════════════════════════
# Bee-Hive OS — Minimal Hyprland Test Configuration 🐝
# For testing in nested mode (Hyprland-in-Hyprland)
# Save as: ~/hyprland-test.conf
# Launch: Hyprland -c ~/hyprland-test.conf
# ═══════════════════════════════════════════════════════════════

monitor=WL-1,1920x1080@60,0x0,1

# ─────────────────────────────────────────────────────────────
# INPUT — Keyboard & Mouse
# ─────────────────────────────────────────────────────────────
input {
    kb_layout = en              # Keyboard layout (en/fr/de/etc.)
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    
    follow_mouse = 1
    touchpad {
        natural_scroll = no
    }
    sensitivity = 0
}

# ─────────────────────────────────────────────────────────────
# GENERAL — Layout & Borders
# ─────────────────────────────────────────────────────────────
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    
    # Honey Gold active borders (Bee-Hive theme)
    col.active_border = rgba(FFB81Cee) rgba(D4960Aee) 45deg
    col.inactive_border = rgba(595959aa)
    
    layout = dwindle
    resize_on_border = true
}

# ─────────────────────────────────────────────────────────────
# DECORATION — Rounded Corners, Shadows, Blur
# ─────────────────────────────────────────────────────────────
decoration {
    rounding = 10
    
    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(FFB81C22)
        color_inactive = rgba(00000055)
    }
    
    blur {
        enabled = true
        size = 5
        passes = 2
        new_optimizations = true
    }
}

# ─────────────────────────────────────────────────────────────
# ANIMATIONS — Smooth Transitions
# ─────────────────────────────────────────────────────────────
animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, myBezier
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 4, default
}

# ═══════════════════════════════════════════════════════════════
# BEE-HIVE OS — KEYBINDINGS 🐝
# ═══════════════════════════════════════════════════════════════

# ─── System Control ───────────────────────────────────────────
bind = SUPER, Q, exit                    # Exit nested Hyprland
bind = SUPER, C, exec, hyprctl reload    # Reload Hyprland config
bind = SUPER, Return, exec, kitty        # Launch terminal

# ─── Bee-Hive Widgets & Panels ────────────────────────────────
# Note: These require Bee-Hive OS to be running (quickshell)
bind = SUPER, Space, exec, quickshell -p ~/beehive_os ipc call root showSearch    # BeeSearch (App Launcher)
bind = SUPER, Escape, exec, quickshell -p ~/beehive_os ipc call root showSettings # BeeSettings Panel
bind = SUPER, P, exec, quickshell -p ~/beehive_os ipc call root showPower        # BeePower Menu

# ─── Volume & Brightness (with Bee-Hive OSD) ──────────────────
# Requires: ~/beehive_os/scripts/bee-osd-cmd.sh
bind = , XF86AudioRaiseVolume, exec, ~/beehive_os/scripts/bee-osd-cmd.sh volume 5%+
bind = , XF86AudioLowerVolume, exec, ~/beehive_os/scripts/bee-osd-cmd.sh volume 5%-
bind = , XF86AudioMute, exec, ~/beehive_os/scripts/bee-osd-cmd.sh volume toggle

bind = , XF86MonBrightnessUp, exec, ~/beehive_os/scripts/bee-osd-cmd.sh brightness 5%+
bind = , XF86MonBrightnessDown, exec, ~/beehive_os/scripts/bee-osd-cmd.sh brightness 5%-

bind = , XF86KbdBrightnessUp, exec, ~/beehive_os/scripts/bee-osd-cmd.sh kbd 5%+
bind = , XF86KbdBrightnessDown, exec, ~/beehive_os/scripts/bee-osd-cmd.sh kbd 5%-

# ─── Window Management ────────────────────────────────────────
bind = SUPER, W, killactive              # Close active window
bind = SUPER, F, fullscreen              # Toggle fullscreen
bind = SUPER, T, togglefloating          # Float/Tile window

# Move focus (vim-style)
bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d

# Switch workspaces
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5

# Move window to workspace
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5

# ═══════════════════════════════════════════════════════════════
# AUTOSTART — Launch Bee-Hive OS on startup
# ═══════════════════════════════════════════════════════════════
exec-once = QML_XHR_ALLOW_FILE_READ=1 quickshell -p ~/beehive_os

