# ═══════════════════════════════════════════════════════════════
# Bee-Hive OS — Neofetch Custom Config
# Remplace ~/.config/neofetch/config.conf
# ═══════════════════════════════════════════════════════════════

# Custom ASCII art (notre logo ruche)
image_backend="ascii"
image_source="$(dirname "${BASH_SOURCE[0]}")/beehive_ascii.txt"

# Couleurs: Honey Gold (3=yellow/gold) + White
ascii_colors=(3 7)
ascii_bold="on"

# Infos à afficher
print_info() {
    prin ""
    info title
    info underline

    info "OS"       distro
    info "Host"     model
    info "Kernel"   kernel
    info "Uptime"   uptime
    info "Packages" packages
    info "Shell"    shell
    info "WM"       wm
    info "Terminal" term
    info "CPU"      cpu
    info "GPU"      gpu
    info "Memory"   memory
    info "Disk"     disk
    info "Local IP" local_ip
    info "Battery"  battery
    prin ""
    info cols
}

# Style
separator=":"
bold="on"
underline_enabled="on"
underline_char="-"
color_blocks="on"
block_width=3
block_height=1
col_offset="auto"
