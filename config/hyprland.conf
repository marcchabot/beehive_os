# ═══════════════════════════════════════════════════════════════
# Hyprland — Configuration principale de Marc 🐝
# Bee-Hive OS · Razer Book 13 (RZ09-0357)
# ═══════════════════════════════════════════════════════════════

# ─── Sources externes ─────────────────────────────────────────
source = ~/.config/hypr/configs/keybinds_razer.conf
source = ~/beehive_os/config/beehive_hypr.conf

# ─── Environnement ────────────────────────────────────────────
env = QT_QPA_PLATFORM,wayland;xcb
env = QML_XHR_ALLOW_FILE_READ,1
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Ice

# ─── Moniteurs ────────────────────────────────────────────────
monitor = ,preferred,auto,auto

# ─── Programmes par défaut ────────────────────────────────────
$terminal    = kitty
$fileManager = thunar
$mainMod     = SUPER

# ─── Autostart ────────────────────────────────────────────────
exec-once = sleep 1 && QML_XHR_ALLOW_FILE_READ=1 quickshell -p ~/beehive_os
exec-once = python3 ~/beehive_os/scripts/beenotifier.py

# ─── Misc ─────────────────────────────────────────────────────
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# ─── Input ────────────────────────────────────────────────────
input {
    kb_layout = us,ca
    kb_options = grp:alt_space_toggle
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = false
    }
}

# ═══════════════════════════════════════════════════════════════
# KEYBINDS — Applications
# ═══════════════════════════════════════════════════════════════
bind = $mainMod, T,      exec, $terminal
bind = $mainMod, E,      exec, $fileManager
bind = $mainMod, W,      exec, zen-browser
bind = $mainMod, Q,      killactive
bind = $mainMod, M,      exit
bind = $mainMod, V,      togglefloating
bind = $mainMod, F,      fullscreen
bind = $mainMod, S,      exec, hyprshot -m region
bind = $mainMod SHIFT, S, exec, hyprshot -m window
bind = $mainMod CONTROL, S, exec, hyprshot -m output

# ─── 🐝 Bee-Hive OS — Contrôles principaux ────────────────────
bind = $mainMod, D,      exec, quickshell -p ~/beehive_os ipc call root toggleDash      # 🍯 MayaDash
bind = $mainMod, Z,      exec, quickshell -p ~/beehive_os ipc call root showLauncher    # 🔍 BeeSearch
bind = $mainMod, Escape, exec, quickshell -p ~/beehive_os ipc call root showSettings    # ⚙️  The Hive
bind = $mainMod, P,      exec, quickshell -p ~/beehive_os ipc call root showPower       # ⏻  BeePower
bind = $mainMod, F12,    exec, quickshell -p ~/beehive_os ipc call root toggleTheme     # 🌙 Dark/Light

# ─── Navigation focus ─────────────────────────────────────────
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# ─── Workspaces ───────────────────────────────────────────────
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# ─── Souris ───────────────────────────────────────────────────
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ═══════════════════════════════════════════════════════════════
# WINDOW & LAYER RULES — Bee-Hive OS
# ═══════════════════════════════════════════════════════════════
windowrule = no_focus on,  match:class ^(quickshell)$
windowrule = no_blur on,   match:class ^(quickshell)$
windowrule = no_shadow on, match:class ^(quickshell)$

layerrule = ignore_alpha 1, match:namespace beehive-aura
layerrule = no_anim on,     match:namespace beehive-aura
layerrule = ignore_alpha 1, match:namespace beehive-bg
layerrule = no_anim on,     match:namespace beehive-bg
layerrule = ignore_alpha 1, match:namespace beehive-bar
layerrule = no_anim on,     match:namespace beehive-bar
layerrule = ignore_alpha 1, match:namespace beehive-settings
layerrule = no_anim on,     match:namespace beehive-settings
layerrule = ignore_alpha 1, match:namespace beehive-studio
layerrule = no_anim on,     match:namespace beehive-studio
layerrule = ignore_alpha 1, match:namespace beehive-control
layerrule = no_anim on,     match:namespace beehive-control
layerrule = ignore_alpha 1, match:namespace beehive-welcome
layerrule = no_anim on,     match:namespace beehive-welcome
layerrule = ignore_alpha 1, match:namespace beehive-power
layerrule = no_anim on,     match:namespace beehive-power
layerrule = ignore_alpha 1, match:namespace beehive-stealth
layerrule = no_anim on,     match:namespace beehive-stealth
layerrule = no_anim on,     match:namespace beehive-search
