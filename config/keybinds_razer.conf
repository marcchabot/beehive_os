# ═══════════════════════════════════════════════════════════════
# Razer Book 13 (RZ09-0357) — Hardware Keybinds 🐝🛡️
# Touches Fn : Audio · Affichage · Media · Luminosité · Clavier
# ═══════════════════════════════════════════════════════════════

# ─── Audio (F1-F3) ────────────────────────────────────────────
bindle = , XF86AudioMute,        exec, ~/beehive_os/scripts/bee-osd-cmd.sh volume toggle
bindle = , XF86AudioLowerVolume, exec, ~/beehive_os/scripts/bee-osd-cmd.sh volume 5%-
bindle = , XF86AudioRaiseVolume, exec, ~/beehive_os/scripts/bee-osd-cmd.sh volume 5%+

# ─── Affichage (F4) ───────────────────────────────────────────
bind = , XF86Display, exec, wdisplays

# ─── Media Control (F5-F7) ────────────────────────────────────
bindle = , XF86AudioPrev, exec, playerctl previous
bindle = , XF86AudioPlay, exec, playerctl play-pause
bindle = , XF86AudioNext, exec, playerctl next

# ─── Luminosité Écran (F8-F9) ────────────────────────────────
bindle = , XF86MonBrightnessDown, exec, ~/beehive_os/scripts/bee-osd-cmd.sh brightness 5%-
bindle = , XF86MonBrightnessUp,   exec, ~/beehive_os/scripts/bee-osd-cmd.sh brightness 5%+

# ─── Rétro-éclairage Clavier (F10-F11) ───────────────────────
bindle = , XF86KbdBrightnessDown, exec, ~/beehive_os/scripts/bee-osd-cmd.sh kbd 5%-
bindle = , XF86KbdBrightnessUp,   exec, ~/beehive_os/scripts/bee-osd-cmd.sh kbd 5%+

# ─── Note : F12 est réservé à Bee-Hive OS (Toggle Dark/Light) ─
# Défini dans hyprland.conf : bind = $mainMod, F12, toggleTheme
# Print Screen (F12 sans Mod) : Capture d'écran complète via hyprshot
bind = , Print, exec, hyprshot -m output
