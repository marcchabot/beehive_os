# ═══════════════════════════════════════════════════════════════
# Bee-Hive OS — Master Kitty Configuration 🐝💻
# v1.2.0 : Nectar Edition — Clean, Fast, Beautiful
# ═══════════════════════════════════════════════════════════════

# --- 🍯 Fonts ---
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# --- 🎨 Colors (Bee-Hive Nectar Palette) ---
background            #0D0D0D
foreground            #FFFFFF
cursor                #FFB81C
cursor_text_color     #0D0D0D
selection_background  #FFB81C
selection_foreground  #0D0D0D

# URL and Borders
url_color             #FFB81C
url_style             curly
active_border_color   #FFB81C
inactive_border_color #333333
bell_border_color     #FFB81C

# Tabs
active_tab_background   #FFB81C
active_tab_foreground   #0D0D0D
inactive_tab_background #1A1A1A
inactive_tab_foreground #AAAAAA
tab_bar_margin_color    #0D0D0D
tab_bar_style           fade

# Standard ANSI Colors (Optimized for visibility)
color0  #1A1A1A
color8  #444444
color1  #FF5555
color9  #FF7777
color2  #50FA7B
color10 #69FF94
color3  #FFB81C
color11 #FFCE54
color4  #8BE9FD
color12 #A8F0FF
color5  #FF79C6
color13 #FF92DF
color6  #62D6E8
color14 #80EEFF
color7  #DDDDDD
color15 #FFFFFF

# --- ✨ Window Aesthetic ---
background_opacity         0.92
background_blur            1
dynamic_background_opacity yes
window_padding_width       15
placement_strategy         center
confirm_os_window_close    0

# --- 🖱️ Mouse & Integration ---
mouse_hide_wait           3.0
copy_on_select            yes
strip_trailing_spaces     smart
focus_follows_mouse       no
shell_integration         enabled
allow_remote_control      yes
listen_on                 unix:@mykitty

# --- ⌨️ Shortcuts ---
kitty_mod ctrl+shift

# Scrolling
map kitty_mod+up    scroll_line_up
map kitty_mod+down  scroll_line_down
map kitty_mod+page_up scroll_page_up
map kitty_mod+page_down scroll_page_down

# Windows & Tabs
map kitty_mod+enter new_window
map kitty_mod+t     new_tab
map kitty_mod+w     close_window
map kitty_mod+]     next_window
map kitty_mod+[     previous_window

# Misc
map kitty_mod+f5    load_config_file
map kitty_mod+equal change_font_size all +2.0
map kitty_mod+minus change_font_size all -2.0

# 🍯 Custom inclusion (if needed)
# include local_extra.conf
