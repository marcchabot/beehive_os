# ═══════════════════════════════════════════════════════════════
# Bee-Hive OS — Keybindings 🐝🛡️
# v2.0 : The Hive (BeeControl) — Unified Control Center
# ═══════════════════════════════════════════════════════════════
#
# ⚠️  INSTALLATION REQUIRED ⚠️
# These keybinds MUST be added to your hyprland.conf to use
# Bee-Hive OS properly. Without them, nothing will work!
#
# 👉 Add this line at the top of your hyprland.conf:
#       source = ~/beehive_os/config/beehive_keybinds.conf
#
# ─── OR copy-paste the binds below directly into hyprland.conf
# ═══════════════════════════════════════════════════════════════

# ─── 🐝 Bee-Hive OS — Core Controls ──────────────────────────
bind = $mainMod, D,      exec, quickshell -p ~/beehive_os ipc call root toggleDash     # 🍯 Toggle MayaDash (Desktop Dashboard)
bind = $mainMod, SPACE,  exec, quickshell -p ~/beehive_os ipc call root toggleSearch   # 🔍 BeeSearch (App Launcher)
bind = $mainMod, Escape, exec, quickshell -p ~/beehive_os ipc call root showSettings   # ⚙️  The Hive (Control Center)
bind = $mainMod, P,      exec, quickshell -p ~/beehive_os ipc call root showPower      # ⏻  BeePower Menu (Shutdown/Reboot)
bind = $mainMod, F12,    exec, quickshell -p ~/beehive_os ipc call root toggleTheme    # 🌙 Toggle HoneyDark / HoneyLight

# ─── 🔊 Volume & Brightness (with Bee-Hive OSD) ──────────────
# Requires: ~/beehive_os/scripts/bee-osd-cmd.sh
bind = , XF86AudioRaiseVolume,  exec, ~/beehive_os/scripts/bee-osd-cmd.sh volume 5%+
bind = , XF86AudioLowerVolume,  exec, ~/beehive_os/scripts/bee-osd-cmd.sh volume 5%-
bind = , XF86AudioMute,         exec, ~/beehive_os/scripts/bee-osd-cmd.sh volume toggle
bind = , XF86MonBrightnessUp,   exec, ~/beehive_os/scripts/bee-osd-cmd.sh brightness 5%+
bind = , XF86MonBrightnessDown, exec, ~/beehive_os/scripts/bee-osd-cmd.sh brightness 5%-

# ─── 🖥️  Window Management ────────────────────────────────────
bind = $mainMod, Q, killactive
bind = $mainMod, F, fullscreen
bind = $mainMod, T, togglefloating

# Move focus (vim-style)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# ─── 🚀 Autostart ─────────────────────────────────────────────
exec-once = QML_XHR_ALLOW_FILE_READ=1 quickshell -p ~/beehive_os
