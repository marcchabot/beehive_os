# ═══════════════════════════════════════════════════════════════
# Bee-Hive OS — Keybindings 🐝🛡️
# v1.1.0 : IPC Commands & Window Management
# ═══════════════════════════════════════════════════════════════

# ─── System Control ───────────────────────────────────────────
bind = SUPER, Return, exec, kitty        # Launch terminal
bind = SUPER, Z, exec, quickshell -p ~/beehive_os ipc call root showLauncher    # BeeSearch (App Launcher)
bind = SUPER, Escape, exec, quickshell -p ~/beehive_os ipc call root showSettings # BeeSettings Panel
bind = SUPER, P, exec, quickshell -p ~/beehive_os ipc call root showPower         # BeePower Menu
bind = SUPER, D, exec, quickshell -p ~/beehive_os ipc call root toggleDash        # Toggle MayaDash

# ─── Volume & Brightness (with Bee-Hive OSD) ──────────────────
# Requires: ~/beehive_os/scripts/bee-osd-cmd.sh
bind = , XF86AudioRaiseVolume, exec, ~/beehive_os/scripts/bee-osd-cmd.sh volume 5%+
bind = , XF86AudioLowerVolume, exec, ~/beehive_os/scripts/bee-osd-cmd.sh volume 5%-
bind = , XF86AudioMute, exec, ~/beehive_os/scripts/bee-osd-cmd.sh volume toggle

bind = , XF86MonBrightnessUp, exec, ~/beehive_os/scripts/bee-osd-cmd.sh brightness 5%+
bind = , XF86MonBrightnessDown, exec, ~/beehive_os/scripts/bee-osd-cmd.sh brightness 5%-

# ─── Window Management ────────────────────────────────────────
bind = SUPER, Q, killactive              # Close active window
bind = SUPER, F, fullscreen              # Toggle fullscreen
bind = SUPER, T, togglefloating          # Float/Tile window

# Move focus (vim-style)
bind = SUPER, H, movefocus, l
bind = SUPER, L, movefocus, r
bind = SUPER, K, movefocus, u
bind = SUPER, J, movefocus, d

# Switch workspaces
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5

# Move window to workspace
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5

# ─── Autostart Hive Desktop ───────────────────────────────────
exec-once = QML_XHR_ALLOW_FILE_READ=1 quickshell -p ~/beehive_os
