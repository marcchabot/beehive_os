# ═══════════════════════════════════════════════════════════════
# Bee-Hive OS — Keybindings 🐝🛡️
# v2.2 : Bee-Hive ONLY keybinds (no window management conflicts)
# ═══════════════════════════════════════════════════════════════
#
# ⚠️  INSTALLATION
# Add ONLY the lines below that don't conflict with your existing
# hyprland.conf keybinds. The 5 Bee-Hive lines are REQUIRED.
#
# Optional: source = ~/beehive_os/config/beehive_keybinds.conf
# ═══════════════════════════════════════════════════════════════

# ─── 🐝 Bee-Hive OS — REQUIRED (5 core keybinds) ─────────────
bind = SUPER, D,      exec, quickshell -p ~/beehive_os ipc call root toggleDash      # 🍯 Toggle MayaDash
bind = SUPER, Z,      exec, quickshell -p ~/beehive_os ipc call root showLauncher    # 🔍 BeeSearch (App Launcher)
bind = SUPER, Escape, exec, quickshell -p ~/beehive_os ipc call root showSettings    # ⚙️  The Hive (Control Center)
bind = SUPER, P,      exec, quickshell -p ~/beehive_os ipc call root showPower       # ⏻  BeePower Menu
bind = SUPER, F12,    exec, quickshell -p ~/beehive_os ipc call root toggleTheme     # 🌙 Toggle HoneyDark / HoneyLight

# ─── 🔊 Volume & Brightness OSD (optional — add if not defined) ──
# bind = , XF86AudioRaiseVolume,  exec, ~/beehive_os/scripts/bee-osd-cmd.sh volume 5%+
# bind = , XF86AudioLowerVolume,  exec, ~/beehive_os/scripts/bee-osd-cmd.sh volume 5%-
# bind = , XF86AudioMute,         exec, ~/beehive_os/scripts/bee-osd-cmd.sh volume toggle
# bind = , XF86MonBrightnessUp,   exec, ~/beehive_os/scripts/bee-osd-cmd.sh brightness 5%+
# bind = , XF86MonBrightnessDown, exec, ~/beehive_os/scripts/bee-osd-cmd.sh brightness 5%-

# ─── 🚀 Autostart ─────────────────────────────────────────────
exec-once = QML_XHR_ALLOW_FILE_READ=1 quickshell -p ~/beehive_os
