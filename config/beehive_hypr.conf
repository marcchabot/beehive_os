# ═══════════════════════════════════════════════════════════════
# Bee-Hive OS — Hyprland Visual Theme 🐝🛡️
# v2.1 : Nectar Borders · Shadows · Blur · Animations
# Source depuis hyprland.conf : source = ~/beehive_os/config/beehive_hypr.conf
# ═══════════════════════════════════════════════════════════════

general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2
    col.active_border   = rgba(FFB81Cee) rgba(D4960Aee) 45deg
    col.inactive_border = rgba(595959aa)
    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 12

    shadow {
        enabled = true
        range = 25
        render_power = 4
        color = rgba(FFB81C22)
        color_inactive = rgba(00000055)
    }

    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = true
    }
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows,     1, 5, myBezier
    animation = windowsOut,  1, 5, default, popin 80%
    animation = border,      1, 10, default
    animation = fade,        1, 5, default
    animation = workspaces,  1, 4, default
}

# ─── Window Rules — Nectar Spirit 🐝 ─────────────────────────
windowrule = border_color rgba(FFB81Cee) rgba(1A1A1Aaa), match:class kitty
windowrule = opacity 0.96 0.94, match:class kitty
windowrule = border_color rgba(FFB81Cee) rgba(1A1A1Aaa), match:fullscreen 1
