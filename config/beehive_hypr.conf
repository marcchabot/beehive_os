# ═══════════════════════════════════════════════════════════════
# Bee-Hive OS — Hyprland Visual Theme 🐝🛡️
# v1.0.0 : Nectar Borders & Shadows
# ═══════════════════════════════════════════════════════════════

general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2
    
    # Honey Gold active borders
    col.active_border = rgba(FFB81Cee) rgba(D4960Aee) 45deg
    
    # Subtle dark inactive borders
    col.inactive_border = rgba(595959aa)

    layout = dwindle
    resize_on_border = true
}

decoration {
    rounding = 12

    # Global Glow Aura 🍯✨ (Version compatible Hyprland v0.40+)
    shadow {
        enabled = true
        range = 25
        render_power = 4
        color = rgba(FFB81C22)
        color_inactive = rgba(00000055)
    }
    
    blur {
        enabled = true
        size = 8
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = true
    }
}

animations {
    enabled = yes
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, myBezier
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 10, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 4, default
}

# Window Rules to enforce Nectar Spirit 🐝
# Hyprland v0.53+ syntax: selector first, rule after
windowrule = border_color rgba(FFB81Cee) rgba(1A1A1Aaa), match:class kitty
windowrule = opacity 0.96 0.94, match:class kitty
windowrule = border_color rgba(FFB81Cee) rgba(1A1A1Aaa), match:fullscreen 1

# 🐝 Bee-Hive OS Layer Rules — New panels (v2.1)
layerrule = ignore_alpha 1, match:namespace beehive-control
layerrule = no_anim on, match:namespace beehive-control
layerrule = ignore_alpha 1, match:namespace beehive-welcome
layerrule = no_anim on, match:namespace beehive-welcome
